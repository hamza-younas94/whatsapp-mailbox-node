<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - WhatsApp Mailbox</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-green-400 to-blue-500 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8">
        <div class="text-center mb-8">
            <i class="fab fa-whatsapp text-green-500 text-6xl mb-4"></i>
            <h1 class="text-3xl font-bold text-gray-800 mb-2">Reset Password</h1>
            <p class="text-gray-600">Enter your new password</p>
        </div>

        <!-- Loading state -->
        <div id="loadingState" class="text-center py-8">
            <i class="fas fa-spinner fa-spin text-green-500 text-3xl mb-4"></i>
            <p class="text-gray-600">Validating reset token...</p>
        </div>

        <!-- Invalid token state -->
        <div id="invalidState" class="hidden text-center py-8">
            <i class="fas fa-times-circle text-red-500 text-5xl mb-4"></i>
            <h2 class="text-xl font-bold text-gray-800 mb-2">Invalid or Expired Link</h2>
            <p class="text-gray-600 mb-4">This password reset link is no longer valid.</p>
            <a href="/forgot-password.html" class="text-green-500 hover:text-green-600 font-medium">
                Request a new reset link
            </a>
        </div>

        <!-- Reset form -->
        <form id="resetForm" class="hidden space-y-6">
            <div>
                <label class="block text-gray-700 font-medium mb-2">New Password</label>
                <input type="password" id="password" required minlength="8"
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent"
                    placeholder="Minimum 8 characters">
            </div>

            <div>
                <label class="block text-gray-700 font-medium mb-2">Confirm Password</label>
                <input type="password" id="confirmPassword" required minlength="8"
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent"
                    placeholder="Repeat your password">
            </div>

            <div id="errorMessage" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded"></div>

            <button type="submit" id="submitBtn"
                class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 rounded-lg transition duration-200">
                <i class="fas fa-lock mr-2"></i>Reset Password
            </button>
        </form>

        <!-- Success state -->
        <div id="successState" class="hidden text-center py-8">
            <i class="fas fa-check-circle text-green-500 text-5xl mb-4"></i>
            <h2 class="text-xl font-bold text-gray-800 mb-2">Password Reset!</h2>
            <p class="text-gray-600 mb-4">Your password has been updated successfully.</p>
            <a href="/login.html" class="bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-6 rounded-lg inline-block transition duration-200">
                <i class="fas fa-sign-in-alt mr-2"></i>Go to Login
            </a>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin + '/api/v1';
        const token = new URLSearchParams(window.location.search).get('token');

        async function validateToken() {
            if (!token) {
                showInvalid();
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/auth/validate-reset-token?token=${encodeURIComponent(token)}`);
                const data = await response.json();

                if (data.success && data.data.valid) {
                    document.getElementById('loadingState').classList.add('hidden');
                    document.getElementById('resetForm').classList.remove('hidden');
                } else {
                    showInvalid();
                }
            } catch {
                showInvalid();
            }
        }

        function showInvalid() {
            document.getElementById('loadingState').classList.add('hidden');
            document.getElementById('invalidState').classList.remove('hidden');
        }

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorDiv = document.getElementById('errorMessage');
            const submitBtn = document.getElementById('submitBtn');

            errorDiv.classList.add('hidden');

            if (password !== confirmPassword) {
                errorDiv.textContent = 'Passwords do not match';
                errorDiv.classList.remove('hidden');
                return;
            }

            if (password.length < 8) {
                errorDiv.textContent = 'Password must be at least 8 characters';
                errorDiv.classList.remove('hidden');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Resetting...';

            try {
                const response = await fetch(`${API_BASE}/auth/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    document.getElementById('resetForm').classList.add('hidden');
                    document.getElementById('successState').classList.remove('hidden');
                } else {
                    errorDiv.textContent = data.error?.message || 'Failed to reset password';
                    errorDiv.classList.remove('hidden');
                }
            } catch {
                errorDiv.textContent = 'Connection error. Please try again.';
                errorDiv.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-lock mr-2"></i>Reset Password';
            }
        });

        validateToken();
    </script>
</body>
</html>
