<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - WhatsApp Mailbox</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .gradient-btn { background: linear-gradient(135deg, #128C7E 0%, #25D366 100%); }
        .gradient-btn:hover { background: linear-gradient(135deg, #0d6b5f 0%, #1fb855 100%); }
    </style>
</head>
<body class="bg-gray-50">
    <script>if (!localStorage.getItem('authToken')) window.location.href = '/login.html';</script>
    <script src="/js/navbar.js"></script>

    <div class="max-w-7xl mx-auto px-4 py-6">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-3xl font-bold text-gray-800"><i class="fas fa-cog text-green-500 mr-2"></i>App Settings</h1>
                <p class="text-gray-600 mt-1">Manage application configuration key-value pairs</p>
            </div>
            <button onclick="showCreateModal()" class="gradient-btn text-white px-6 py-3 rounded-xl font-medium shadow-lg hover:shadow-xl transition-all">
                <i class="fas fa-plus mr-2"></i>New Setting
            </button>
        </div>

        <!-- Search -->
        <div class="flex flex-wrap gap-3 mb-6">
            <input type="text" id="searchInput" onkeyup="filterConfigs()" placeholder="Search settings..." class="px-4 py-2 border rounded-lg focus:ring-2 focus:ring-green-500 w-64">
            <select id="typeFilter" onchange="filterConfigs()" class="px-4 py-2 border rounded-lg focus:ring-2 focus:ring-green-500">
                <option value="">All Types</option>
                <option value="STRING">STRING</option>
                <option value="NUMBER">NUMBER</option>
                <option value="BOOLEAN">BOOLEAN</option>
                <option value="JSON">JSON</option>
            </select>
        </div>

        <!-- Settings Table -->
        <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
            <table class="w-full">
                <thead class="bg-gray-50 border-b">
                    <tr>
                        <th class="text-left px-6 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Key</th>
                        <th class="text-left px-6 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Value</th>
                        <th class="text-left px-6 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Type</th>
                        <th class="text-left px-6 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Updated</th>
                        <th class="text-right px-6 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Actions</th>
                    </tr>
                </thead>
                <tbody id="configTableBody">
                    <tr><td colspan="5" class="text-center py-12 text-gray-400"><i class="fas fa-spinner fa-spin text-3xl"></i></td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Create/Edit Modal -->
    <div id="configModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg">
            <div class="p-6 border-b">
                <h2 id="modalTitle" class="text-2xl font-bold text-gray-800">New Setting</h2>
            </div>
            <form id="configForm" class="p-6 space-y-4">
                <input type="hidden" id="editId">
                <div>
                    <label class="block text-gray-700 font-medium mb-1">Key</label>
                    <input type="text" id="configKey" required class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-green-500" placeholder="e.g. MAX_RETRIES">
                </div>
                <div>
                    <label class="block text-gray-700 font-medium mb-1">Type</label>
                    <select id="configType" required onchange="onTypeChange()" class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-green-500">
                        <option value="STRING">STRING</option>
                        <option value="NUMBER">NUMBER</option>
                        <option value="BOOLEAN">BOOLEAN</option>
                        <option value="JSON">JSON</option>
                    </select>
                </div>
                <div id="valueFieldContainer">
                    <label class="block text-gray-700 font-medium mb-1">Value</label>
                    <input type="text" id="configValue" required class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-green-500" placeholder="Setting value">
                </div>
                <div id="booleanFieldContainer" class="hidden">
                    <label class="block text-gray-700 font-medium mb-1">Value</label>
                    <select id="configBooleanValue" class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-green-500">
                        <option value="true">true</option>
                        <option value="false">false</option>
                    </select>
                </div>
                <div id="jsonFieldContainer" class="hidden">
                    <label class="block text-gray-700 font-medium mb-1">Value (JSON)</label>
                    <textarea id="configJsonValue" rows="5" class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-green-500 font-mono text-sm" placeholder='{"key": "value"}'></textarea>
                    <p class="text-xs text-gray-400 mt-1">Enter valid JSON</p>
                </div>
                <div class="flex space-x-3 pt-2">
                    <button type="submit" class="flex-1 gradient-btn text-white py-3 rounded-lg font-medium">Save Setting</button>
                    <button type="button" onclick="hideModal()" class="px-6 py-3 border rounded-lg text-gray-600 hover:bg-gray-50">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin + '/api/v1';
        const token = localStorage.getItem('authToken');
        let allConfigs = [];

        async function fetchWithAuth(url, options = {}) {
            const res = await fetch(url, { ...options, headers: { ...options.headers, 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' } });
            if (res.status === 401) { localStorage.removeItem('authToken'); window.location.href = '/login.html'; }
            return res.json();
        }

        async function loadConfigs() {
            const data = await fetchWithAuth(`${API_BASE}/app-config`);
            allConfigs = data.data || [];
            filterConfigs();
        }

        function filterConfigs() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const type = document.getElementById('typeFilter').value;

            let filtered = allConfigs;
            if (search) filtered = filtered.filter(c => c.key.toLowerCase().includes(search) || String(c.value).toLowerCase().includes(search));
            if (type) filtered = filtered.filter(c => c.type === type);

            renderTable(filtered);
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function formatValue(config) {
            const val = String(config.value);
            if (config.type === 'BOOLEAN') {
                const isTrue = val === 'true';
                return `<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${isTrue ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}">${val}</span>`;
            }
            if (config.type === 'JSON') {
                const truncated = val.length > 60 ? val.substring(0, 60) + '...' : val;
                return `<code class="text-xs bg-gray-100 px-2 py-1 rounded font-mono">${escapeHtml(truncated)}</code>`;
            }
            if (config.type === 'NUMBER') {
                return `<span class="font-mono text-blue-600">${escapeHtml(val)}</span>`;
            }
            const truncated = val.length > 80 ? val.substring(0, 80) + '...' : val;
            return `<span class="text-gray-700">${escapeHtml(truncated)}</span>`;
        }

        function typeBadge(type) {
            const colors = { STRING: 'bg-gray-100 text-gray-700', NUMBER: 'bg-blue-100 text-blue-700', BOOLEAN: 'bg-purple-100 text-purple-700', JSON: 'bg-yellow-100 text-yellow-700' };
            return `<span class="inline-block px-2 py-0.5 text-xs rounded-full font-medium ${colors[type] || 'bg-gray-100 text-gray-700'}">${type}</span>`;
        }

        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const d = new Date(dateStr);
            return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        function renderTable(configs) {
            const tbody = document.getElementById('configTableBody');
            if (configs.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center py-12 text-gray-400"><i class="fas fa-cog text-5xl mb-4 opacity-30"></i><p>No settings found</p></td></tr>';
                return;
            }

            tbody.innerHTML = configs.map(c => `
                <tr class="border-b hover:bg-gray-50 transition-colors">
                    <td class="px-6 py-4 font-medium text-gray-900 font-mono text-sm">${escapeHtml(c.key)}</td>
                    <td class="px-6 py-4 max-w-xs">${formatValue(c)}</td>
                    <td class="px-6 py-4">${typeBadge(c.type)}</td>
                    <td class="px-6 py-4 text-sm text-gray-500">${formatDate(c.updatedAt)}</td>
                    <td class="px-6 py-4 text-right">
                        <button onclick="editConfig('${c.id}')" class="text-blue-500 hover:text-blue-700 mr-3" title="Edit"><i class="fas fa-edit"></i></button>
                        <button onclick="deleteConfig('${c.id}')" class="text-red-500 hover:text-red-700" title="Delete"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        function onTypeChange() {
            const type = document.getElementById('configType').value;
            document.getElementById('valueFieldContainer').classList.toggle('hidden', type === 'BOOLEAN' || type === 'JSON');
            document.getElementById('booleanFieldContainer').classList.toggle('hidden', type !== 'BOOLEAN');
            document.getElementById('jsonFieldContainer').classList.toggle('hidden', type !== 'JSON');

            // Adjust required attributes
            document.getElementById('configValue').required = (type !== 'BOOLEAN' && type !== 'JSON');
        }

        function showCreateModal() {
            document.getElementById('editId').value = '';
            document.getElementById('modalTitle').textContent = 'New Setting';
            document.getElementById('configForm').reset();
            document.getElementById('configKey').disabled = false;
            document.getElementById('configType').value = 'STRING';
            onTypeChange();
            document.getElementById('configModal').classList.remove('hidden');
        }

        function hideModal() {
            document.getElementById('configModal').classList.add('hidden');
        }

        function editConfig(id) {
            const c = allConfigs.find(x => x.id === id);
            if (!c) return;
            document.getElementById('editId').value = c.id;
            document.getElementById('modalTitle').textContent = 'Edit Setting';
            document.getElementById('configKey').value = c.key;
            document.getElementById('configKey').disabled = true;
            document.getElementById('configType').value = c.type;
            onTypeChange();

            if (c.type === 'BOOLEAN') {
                document.getElementById('configBooleanValue').value = String(c.value);
            } else if (c.type === 'JSON') {
                try {
                    document.getElementById('configJsonValue').value = typeof c.value === 'string' ? c.value : JSON.stringify(c.value, null, 2);
                } catch { document.getElementById('configJsonValue').value = String(c.value); }
            } else {
                document.getElementById('configValue').value = String(c.value);
            }

            document.getElementById('configModal').classList.remove('hidden');
        }

        async function deleteConfig(id) {
            const c = allConfigs.find(x => x.id === id);
            if (!confirm(`Delete setting "${c ? c.key : id}"?`)) return;
            await fetchWithAuth(`${API_BASE}/app-config/${id}`, { method: 'DELETE' });
            loadConfigs();
        }

        function getFormValue() {
            const type = document.getElementById('configType').value;
            if (type === 'BOOLEAN') return document.getElementById('configBooleanValue').value;
            if (type === 'JSON') {
                const raw = document.getElementById('configJsonValue').value.trim();
                try { JSON.parse(raw); } catch (e) { alert('Invalid JSON: ' + e.message); return null; }
                return raw;
            }
            return document.getElementById('configValue').value;
        }

        document.getElementById('configForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const editId = document.getElementById('editId').value;
            const value = getFormValue();
            if (value === null) return;

            const body = {
                key: document.getElementById('configKey').value.trim(),
                value: value,
                type: document.getElementById('configType').value,
            };

            if (editId) {
                await fetchWithAuth(`${API_BASE}/app-config/${editId}`, { method: 'PUT', body: JSON.stringify(body) });
            } else {
                await fetchWithAuth(`${API_BASE}/app-config`, { method: 'POST', body: JSON.stringify(body) });
            }

            hideModal();
            loadConfigs();
        });

        document.getElementById('configModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('configModal')) hideModal();
        });

        loadConfigs();
    </script>
</body>
</html>
