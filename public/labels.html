<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Labels - WhatsApp Mailbox</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .gradient-btn { background: linear-gradient(135deg, #128C7E 0%, #25D366 100%); }
        .gradient-btn:hover { background: linear-gradient(135deg, #0d6b5f 0%, #1fb855 100%); }
    </style>
</head>
<body class="bg-gray-50">
    <script>if (!localStorage.getItem('authToken')) window.location.href = '/login.html';</script>
    <script src="/js/navbar.js"></script>

    <div class="max-w-5xl mx-auto px-4 py-6">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-3xl font-bold text-gray-800"><i class="fas fa-tag text-green-500 mr-2"></i>Labels</h1>
                <p class="text-gray-600 mt-1">Organize your conversations with custom labels</p>
            </div>
            <button onclick="showCreateModal()" class="gradient-btn text-white px-6 py-3 rounded-xl font-medium shadow-lg hover:shadow-xl transition-all">
                <i class="fas fa-plus mr-2"></i>New Label
            </button>
        </div>

        <!-- Labels Grid -->
        <div id="labelsList" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
            <div class="col-span-full text-center py-12 text-gray-400"><i class="fas fa-spinner fa-spin text-3xl"></i></div>
        </div>
    </div>

    <!-- Create/Edit Modal -->
    <div id="createModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md">
            <div class="p-6 border-b">
                <h2 id="modalTitle" class="text-2xl font-bold text-gray-800">New Label</h2>
            </div>
            <form id="labelForm" class="p-6 space-y-4">
                <input type="hidden" id="editId">
                <div>
                    <label class="block text-gray-700 font-medium mb-1">Name</label>
                    <input type="text" id="labelName" required class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-green-500" placeholder="e.g. VIP, Follow-up, Urgent">
                </div>
                <div>
                    <label class="block text-gray-700 font-medium mb-1">Color</label>
                    <div class="flex items-center gap-3">
                        <input type="color" id="labelColor" value="#3B82F6" class="w-12 h-12 rounded-lg border cursor-pointer">
                        <div class="flex flex-wrap gap-2">
                            <button type="button" onclick="setColor('#EF4444')" class="w-8 h-8 rounded-full bg-red-500 hover:ring-2 ring-offset-2 ring-red-500"></button>
                            <button type="button" onclick="setColor('#F59E0B')" class="w-8 h-8 rounded-full bg-yellow-500 hover:ring-2 ring-offset-2 ring-yellow-500"></button>
                            <button type="button" onclick="setColor('#10B981')" class="w-8 h-8 rounded-full bg-green-500 hover:ring-2 ring-offset-2 ring-green-500"></button>
                            <button type="button" onclick="setColor('#3B82F6')" class="w-8 h-8 rounded-full bg-blue-500 hover:ring-2 ring-offset-2 ring-blue-500"></button>
                            <button type="button" onclick="setColor('#8B5CF6')" class="w-8 h-8 rounded-full bg-purple-500 hover:ring-2 ring-offset-2 ring-purple-500"></button>
                            <button type="button" onclick="setColor('#EC4899')" class="w-8 h-8 rounded-full bg-pink-500 hover:ring-2 ring-offset-2 ring-pink-500"></button>
                            <button type="button" onclick="setColor('#6B7280')" class="w-8 h-8 rounded-full bg-gray-500 hover:ring-2 ring-offset-2 ring-gray-500"></button>
                        </div>
                    </div>
                </div>
                <div class="flex space-x-3 pt-2">
                    <button type="submit" class="flex-1 gradient-btn text-white py-3 rounded-lg font-medium">Save Label</button>
                    <button type="button" onclick="hideModal()" class="px-6 py-3 border rounded-lg text-gray-600 hover:bg-gray-50">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin + '/api/v1';
        const token = localStorage.getItem('authToken');
        let allLabels = [];

        async function fetchWithAuth(url, options = {}) {
            const res = await fetch(url, { ...options, headers: { ...options.headers, 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' } });
            if (res.status === 401) { localStorage.removeItem('authToken'); window.location.href = '/login.html'; }
            return res.json();
        }

        async function loadLabels() {
            const data = await fetchWithAuth(`${API_BASE}/labels`);
            allLabels = data.data || [];
            const container = document.getElementById('labelsList');

            if (allLabels.length === 0) {
                container.innerHTML = '<div class="col-span-full text-center py-12 text-gray-400"><i class="fas fa-tag text-5xl mb-4 opacity-30"></i><p>No labels yet. Create your first label!</p></div>';
                return;
            }

            container.innerHTML = allLabels.map(l => `
                <div class="bg-white rounded-xl p-5 shadow-sm border hover:shadow-md transition-all">
                    <div class="flex items-center justify-between mb-3">
                        <div class="flex items-center gap-3">
                            <div class="w-5 h-5 rounded-full flex-shrink-0" style="background-color: ${l.color}"></div>
                            <h3 class="font-semibold text-gray-800">${l.name}</h3>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="editLabel('${l.id}')" class="text-blue-500 hover:text-blue-700 text-sm"><i class="fas fa-edit"></i></button>
                            <button onclick="deleteLabel('${l.id}')" class="text-red-500 hover:text-red-700 text-sm"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                    <p class="text-gray-400 text-xs">${l._count?.conversations || 0} conversations</p>
                </div>
            `).join('');
        }

        function setColor(color) { document.getElementById('labelColor').value = color; }

        function showCreateModal() {
            document.getElementById('editId').value = '';
            document.getElementById('modalTitle').textContent = 'New Label';
            document.getElementById('labelForm').reset();
            document.getElementById('labelColor').value = '#3B82F6';
            document.getElementById('createModal').classList.remove('hidden');
        }

        function hideModal() { document.getElementById('createModal').classList.add('hidden'); }

        function editLabel(id) {
            const l = allLabels.find(x => x.id === id);
            if (!l) return;
            document.getElementById('editId').value = l.id;
            document.getElementById('modalTitle').textContent = 'Edit Label';
            document.getElementById('labelName').value = l.name;
            document.getElementById('labelColor').value = l.color;
            document.getElementById('createModal').classList.remove('hidden');
        }

        async function deleteLabel(id) {
            if (!confirm('Delete this label?')) return;
            await fetchWithAuth(`${API_BASE}/labels/${id}`, { method: 'DELETE' });
            loadLabels();
        }

        document.getElementById('labelForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const editId = document.getElementById('editId').value;
            const body = {
                name: document.getElementById('labelName').value,
                color: document.getElementById('labelColor').value,
            };

            if (editId) {
                await fetchWithAuth(`${API_BASE}/labels/${editId}`, { method: 'PUT', body: JSON.stringify(body) });
            } else {
                await fetchWithAuth(`${API_BASE}/labels`, { method: 'POST', body: JSON.stringify(body) });
            }

            hideModal();
            loadLabels();
        });

        document.getElementById('createModal').addEventListener('click', (e) => { if (e.target === document.getElementById('createModal')) hideModal(); });

        loadLabels();
    </script>
</body>
</html>
