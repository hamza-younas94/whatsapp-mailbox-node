<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscriptions - WhatsApp Mailbox</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https: data:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.tailwindcss.com https://cdnjs.cloudflare.com https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com; font-src 'self' data: https://cdnjs.cloudflare.com https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' http://whatshub.nexofydigital.com:3000 https://whatshub.nexofydigital.com:3000;">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .gradient-btn { background: linear-gradient(135deg, #128C7E 0%, #25D366 100%); }
        .gradient-btn:hover { background: linear-gradient(135deg, #0d6b5f 0%, #1fb855 100%); }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-gray-50">
    <script>
        if (!localStorage.getItem('authToken')) window.location.href = '/login.html';
    </script>
    <script src="/js/navbar.js"></script>

    <div class="max-w-7xl mx-auto px-4 py-6">
        <!-- Header -->
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-3xl font-bold text-gray-800">Customer Subscriptions</h1>
                <p class="text-gray-600 mt-1">Manage recurring billing and subscription plans for your customers</p>
            </div>
            <button onclick="showCreateModal()"
                class="gradient-btn text-white px-6 py-3 rounded-xl font-medium shadow-lg hover:shadow-xl transition-all">
                <i class="fas fa-plus mr-2"></i>Create Subscription
            </button>
        </div>

        <!-- Stats Cards -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
            <div class="bg-white rounded-xl shadow-sm p-5 border-l-4 border-gray-400">
                <div class="flex justify-between items-center">
                    <div>
                        <div class="text-3xl font-bold text-gray-800" id="totalCount">0</div>
                        <div class="text-sm text-gray-500">Total Subscriptions</div>
                    </div>
                    <div class="p-3 bg-gray-100 rounded-full">
                        <i class="fas fa-sync-alt text-gray-600 text-xl"></i>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-sm p-5 border-l-4 border-green-500">
                <div class="flex justify-between items-center">
                    <div>
                        <div class="text-3xl font-bold text-green-600" id="activeCount">0</div>
                        <div class="text-sm text-gray-500">Active</div>
                    </div>
                    <div class="p-3 bg-green-100 rounded-full">
                        <i class="fas fa-check-circle text-green-600 text-xl"></i>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-sm p-5 border-l-4 border-red-500">
                <div class="flex justify-between items-center">
                    <div>
                        <div class="text-3xl font-bold text-red-600" id="expiredCount">0</div>
                        <div class="text-sm text-gray-500">Expired</div>
                    </div>
                    <div class="p-3 bg-red-100 rounded-full">
                        <i class="fas fa-times-circle text-red-600 text-xl"></i>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-sm p-5 border-l-4 border-blue-500">
                <div class="flex justify-between items-center">
                    <div>
                        <div class="text-3xl font-bold text-blue-600" id="monthlyRevenue">0</div>
                        <div class="text-sm text-gray-500">Monthly Revenue</div>
                    </div>
                    <div class="p-3 bg-blue-100 rounded-full">
                        <i class="fas fa-chart-line text-blue-600 text-xl"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Filters & Search -->
        <div class="bg-white rounded-xl shadow-sm">
            <div class="p-4 border-b grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="md:col-span-2 relative">
                    <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
                    <input type="text" id="searchInput" placeholder="Search by contact name, plan name..."
                        class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500">
                </div>
                <select id="statusFilter" class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500">
                    <option value="">All Status</option>
                    <option value="ACTIVE">Active</option>
                    <option value="SUSPENDED">Suspended</option>
                    <option value="SUB_CANCELLED">Cancelled</option>
                    <option value="EXPIRED">Expired</option>
                </select>
                <select id="billingCycleFilter" class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500">
                    <option value="">All Billing Cycles</option>
                    <option value="DAILY">Daily</option>
                    <option value="WEEKLY">Weekly</option>
                    <option value="MONTHLY">Monthly</option>
                    <option value="QUARTERLY">Quarterly</option>
                    <option value="YEARLY">Yearly</option>
                </select>
            </div>

            <!-- Subscriptions Grid -->
            <div id="subscriptionsList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 p-4">
                <div class="col-span-full p-8 text-center text-gray-500">
                    <i class="fas fa-spinner fa-spin text-4xl mb-2"></i>
                    <p>Loading subscriptions...</p>
                </div>
            </div>

            <!-- Pagination -->
            <div id="pagination" class="p-4 border-t flex justify-between items-center"></div>
        </div>
    </div>

    <!-- Create/Edit Subscription Modal -->
    <div id="subscriptionModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl max-w-2xl w-full p-6 max-h-[90vh] overflow-y-auto shadow-2xl">
            <div class="flex items-center justify-between mb-4">
                <h2 id="modalTitle" class="text-2xl font-bold text-gray-800">New Subscription</h2>
                <button onclick="hideModal()" class="p-2 hover:bg-gray-100 rounded-full transition-all">
                    <i class="fas fa-times text-gray-500"></i>
                </button>
            </div>
            <form id="subscriptionForm" class="space-y-4">
                <input type="hidden" id="subscriptionId">

                <div>
                    <label class="block text-gray-700 mb-2 font-medium">Contact *</label>
                    <select id="contactId" required
                        class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500">
                        <option value="">Select a contact...</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-gray-700 mb-2 font-medium">Plan Name *</label>
                        <input type="text" id="planName" required
                            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500"
                            placeholder="e.g., Premium Monthly">
                    </div>
                    <div>
                        <label class="block text-gray-700 mb-2 font-medium">Amount *</label>
                        <input type="number" id="amount" required min="0" step="0.01"
                            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500"
                            placeholder="e.g., 5000">
                    </div>
                </div>

                <div>
                    <label class="block text-gray-700 mb-2 font-medium">Description</label>
                    <textarea id="description" rows="3"
                        class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500"
                        placeholder="Subscription plan details..."></textarea>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-gray-700 mb-2 font-medium">Billing Cycle *</label>
                        <select id="billingCycle" required
                            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500">
                            <option value="DAILY">Daily</option>
                            <option value="WEEKLY">Weekly</option>
                            <option value="MONTHLY" selected>Monthly</option>
                            <option value="QUARTERLY">Quarterly</option>
                            <option value="YEARLY">Yearly</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-gray-700 mb-2 font-medium">Start Date *</label>
                        <input type="date" id="startDate" required
                            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-gray-700 mb-2 font-medium">End Date <span class="text-gray-400 font-normal">(optional)</span></label>
                        <input type="date" id="endDate"
                            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500">
                    </div>
                    <div class="flex items-end">
                        <label class="flex items-center p-3 border rounded-lg cursor-pointer hover:bg-gray-50 transition-all has-[:checked]:bg-green-50 has-[:checked]:border-green-500 w-full">
                            <input type="checkbox" id="autoRenew" class="mr-3 w-5 h-5 text-green-600 rounded" checked>
                            <div>
                                <span class="font-medium text-gray-800">Auto Renew</span>
                                <p class="text-xs text-gray-500">Automatically renew subscription</p>
                            </div>
                        </label>
                    </div>
                </div>

                <div>
                    <label class="block text-gray-700 mb-2 font-medium">Notes</label>
                    <textarea id="notes" rows="2"
                        class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500"
                        placeholder="Internal notes about this subscription..."></textarea>
                </div>

                <div class="border-t pt-4 flex space-x-4">
                    <button type="submit" class="flex-1 gradient-btn text-white py-3 rounded-lg font-semibold shadow-lg transition-all">
                        <i class="fas fa-save mr-2"></i>Save Subscription
                    </button>
                    <button type="button" onclick="hideModal()"
                        class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-800 py-3 rounded-lg font-semibold transition-all">
                        Cancel
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl max-w-md w-full p-6 shadow-2xl">
            <div class="text-center mb-6">
                <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-exclamation-triangle text-red-500 text-2xl"></i>
                </div>
                <h3 class="text-xl font-bold text-gray-800 mb-2">Delete Subscription</h3>
                <p class="text-gray-600">Are you sure you want to delete this subscription? This action cannot be undone.</p>
            </div>
            <input type="hidden" id="deleteSubscriptionId">
            <div class="flex space-x-4">
                <button onclick="confirmDelete()" class="flex-1 bg-red-500 hover:bg-red-600 text-white py-3 rounded-lg font-semibold transition-all">
                    <i class="fas fa-trash mr-2"></i>Delete
                </button>
                <button onclick="hideDeleteModal()" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-800 py-3 rounded-lg font-semibold transition-all">
                    Cancel
                </button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin + '/api/v1';
        let allSubscriptions = [];
        let allContacts = [];
        let currentPage = 1;
        let totalPages = 1;
        let totalRecords = 0;
        const PAGE_LIMIT = 12;

        async function fetchWithAuth(url, options = {}) {
            const token = localStorage.getItem('authToken');
            const headers = {
                'Content-Type': 'application/json',
                ...(token && { 'Authorization': `Bearer ${token}` }),
                ...options.headers
            };
            try {
                const response = await fetch(url, { ...options, headers });
                if (response.status === 401) {
                    localStorage.removeItem('authToken');
                    window.location.href = '/login.html';
                }
                return response;
            } catch (error) {
                console.error('Fetch error:', error);
                throw error;
            }
        }

        function showNotification(message, type = 'info') {
            const colors = { success: 'bg-green-500', error: 'bg-red-500', info: 'bg-blue-500' };
            const notification = document.createElement('div');
            notification.className = `fixed top-4 right-4 ${colors[type]} text-white px-6 py-3 rounded-lg shadow-lg z-50 transition-all`;
            notification.textContent = message;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 3000);
        }

        // --- Load Data ---

        async function loadContacts() {
            try {
                const response = await fetchWithAuth(`${API_BASE}/contacts?limit=100`);
                if (response.ok) {
                    const result = await response.json();
                    allContacts = result.data?.data || result.data || [];
                    populateContactDropdown();
                }
            } catch (error) {
                console.error('Error loading contacts:', error);
            }
        }

        function populateContactDropdown() {
            const select = document.getElementById('contactId');
            select.innerHTML = '<option value="">Select a contact...</option>';
            allContacts.forEach(contact => {
                const name = contact.name || contact.pushName || contact.phoneNumber;
                const option = document.createElement('option');
                option.value = contact.id;
                option.textContent = `${name} (${contact.phoneNumber})`;
                select.appendChild(option);
            });
        }

        async function loadSubscriptions(page = 1) {
            currentPage = page;
            const search = document.getElementById('searchInput').value;
            const status = document.getElementById('statusFilter').value;
            const billingCycle = document.getElementById('billingCycleFilter').value;

            const params = new URLSearchParams({
                page,
                limit: PAGE_LIMIT,
                ...(search && { search }),
                ...(status && { status }),
                ...(billingCycle && { billingCycle })
            });

            try {
                const response = await fetchWithAuth(`${API_BASE}/customer-subscriptions?${params}`);
                if (response.ok) {
                    const result = await response.json();
                    allSubscriptions = result.items || result.data || [];
                    totalRecords = result.pagination?.total || result.total || allSubscriptions.length;
                    totalPages = Math.ceil(totalRecords / PAGE_LIMIT) || 1;
                    updateStats();
                    displaySubscriptions(allSubscriptions);
                    displayPagination();
                } else {
                    allSubscriptions = [];
                    displaySubscriptions([]);
                    displayPagination();
                }
            } catch (error) {
                console.error('Error loading subscriptions:', error);
                allSubscriptions = [];
                displaySubscriptions([]);
                displayPagination();
            }
        }

        // --- Stats ---

        function updateStats() {
            const active = allSubscriptions.filter(s => s.status === 'ACTIVE').length;
            const expired = allSubscriptions.filter(s => s.status === 'EXPIRED').length;
            const monthlyRev = allSubscriptions
                .filter(s => s.status === 'ACTIVE')
                .reduce((sum, s) => {
                    const amount = parseFloat(s.amount) || 0;
                    switch (s.billingCycle) {
                        case 'DAILY': return sum + (amount * 30);
                        case 'WEEKLY': return sum + (amount * 4.33);
                        case 'MONTHLY': return sum + amount;
                        case 'QUARTERLY': return sum + (amount / 3);
                        case 'YEARLY': return sum + (amount / 12);
                        default: return sum + amount;
                    }
                }, 0);

            document.getElementById('totalCount').textContent = totalRecords;
            document.getElementById('activeCount').textContent = active;
            document.getElementById('expiredCount').textContent = expired;
            document.getElementById('monthlyRevenue').textContent = 'PKR ' + Math.round(monthlyRev).toLocaleString();
        }

        // --- Status & Billing Cycle Badges ---

        function getStatusBadge(status) {
            const map = {
                'ACTIVE': 'bg-green-100 text-green-700',
                'SUSPENDED': 'bg-yellow-100 text-yellow-700',
                'SUB_CANCELLED': 'bg-red-100 text-red-700',
                'EXPIRED': 'bg-gray-100 text-gray-700'
            };
            const labels = {
                'ACTIVE': 'Active',
                'SUSPENDED': 'Suspended',
                'SUB_CANCELLED': 'Cancelled',
                'EXPIRED': 'Expired'
            };
            const cls = map[status] || 'bg-gray-100 text-gray-700';
            const label = labels[status] || status;
            return `<span class="px-2.5 py-1 rounded-full text-xs font-semibold ${cls}">${label}</span>`;
        }

        function getBillingCycleBadge(cycle) {
            const map = {
                'DAILY': 'bg-purple-100 text-purple-700',
                'WEEKLY': 'bg-blue-100 text-blue-700',
                'MONTHLY': 'bg-green-100 text-green-700',
                'QUARTERLY': 'bg-orange-100 text-orange-700',
                'YEARLY': 'bg-red-100 text-red-700'
            };
            const shortLabels = {
                'DAILY': '/day',
                'WEEKLY': '/wk',
                'MONTHLY': '/mo',
                'QUARTERLY': '/qtr',
                'YEARLY': '/yr'
            };
            const cls = map[cycle] || 'bg-gray-100 text-gray-700';
            return { cls, short: shortLabels[cycle] || '' };
        }

        // --- Display ---

        function displaySubscriptions(subscriptions) {
            const container = document.getElementById('subscriptionsList');

            if (subscriptions.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full p-12 text-center">
                        <div class="w-20 h-20 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-4">
                            <i class="fas fa-sync-alt text-4xl text-gray-400"></i>
                        </div>
                        <h3 class="text-xl font-semibold text-gray-700 mb-2">No subscriptions found</h3>
                        <p class="text-gray-500 mb-6">Create your first subscription to start managing recurring billing</p>
                        <button onclick="showCreateModal()" class="gradient-btn text-white px-6 py-3 rounded-lg font-medium shadow-lg">
                            <i class="fas fa-plus mr-2"></i>Create Subscription
                        </button>
                    </div>
                `;
                return;
            }

            container.innerHTML = subscriptions.map(sub => {
                const contactName = sub.contact?.name || sub.contact?.pushName || sub.contact?.phoneNumber || sub.contactId || 'Unknown';
                const amount = parseFloat(sub.amount) || 0;
                const cycle = getBillingCycleBadge(sub.billingCycle);
                const nextBilling = sub.nextBillingDate ? new Date(sub.nextBillingDate).toLocaleDateString() : 'N/A';
                const startDate = sub.startDate ? new Date(sub.startDate).toLocaleDateString() : 'N/A';
                const endDate = sub.endDate ? new Date(sub.endDate).toLocaleDateString() : 'No end date';

                return `
                <div class="border rounded-xl p-5 hover:shadow-lg transition-all card-hover bg-white">
                    <div class="flex justify-between items-start mb-3">
                        <div class="flex items-center space-x-2">
                            <div class="w-10 h-10 rounded-full bg-gradient-to-br from-green-400 to-blue-500 flex items-center justify-center text-white font-bold text-sm flex-shrink-0">
                                ${contactName.charAt(0).toUpperCase()}
                            </div>
                            <div>
                                <h3 class="font-semibold text-gray-800">${contactName}</h3>
                                <p class="text-sm text-gray-500">${sub.planName || 'Untitled Plan'}</p>
                            </div>
                        </div>
                        <div class="flex space-x-1">
                            <button onclick="editSubscription('${sub.id}')"
                                class="p-2 text-blue-500 hover:text-blue-700 hover:bg-blue-50 rounded-lg transition-all" title="Edit">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button onclick="showDeleteModal('${sub.id}')"
                                class="p-2 text-red-500 hover:text-red-700 hover:bg-red-50 rounded-lg transition-all" title="Delete">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Amount & Billing Cycle -->
                    <div class="flex items-center space-x-2 mb-3">
                        <span class="text-2xl font-bold text-gray-800">PKR ${amount.toLocaleString()}</span>
                        <span class="px-2.5 py-1 rounded-full text-xs font-semibold ${cycle.cls}">${sub.billingCycle}${cycle.short ? ' (' + cycle.short + ')' : ''}</span>
                    </div>

                    <!-- Status -->
                    <div class="flex items-center space-x-2 mb-3">
                        ${getStatusBadge(sub.status)}
                        ${sub.autoRenew ? '<span class="px-2.5 py-1 rounded-full text-xs font-semibold bg-blue-50 text-blue-600"><i class="fas fa-redo mr-1"></i>Auto-renew</span>' : '<span class="px-2.5 py-1 rounded-full text-xs font-semibold bg-gray-50 text-gray-500">No auto-renew</span>'}
                    </div>

                    <!-- Dates -->
                    <div class="border-t pt-3 space-y-1.5 text-xs text-gray-500">
                        <div class="flex justify-between">
                            <span><i class="fas fa-calendar-plus mr-1.5"></i>Start</span>
                            <span class="font-medium text-gray-700">${startDate}</span>
                        </div>
                        <div class="flex justify-between">
                            <span><i class="fas fa-calendar-minus mr-1.5"></i>End</span>
                            <span class="font-medium text-gray-700">${endDate}</span>
                        </div>
                        <div class="flex justify-between">
                            <span><i class="fas fa-calendar-check mr-1.5"></i>Next Billing</span>
                            <span class="font-medium ${sub.status === 'ACTIVE' ? 'text-green-600' : 'text-gray-700'}">${nextBilling}</span>
                        </div>
                    </div>
                </div>
            `}).join('');
        }

        // --- Pagination ---

        function displayPagination() {
            const container = document.getElementById('pagination');
            if (totalRecords === 0) {
                container.innerHTML = '';
                return;
            }

            container.innerHTML = `
                <div class="text-gray-600 text-sm">
                    Showing ${allSubscriptions.length} of ${totalRecords} subscriptions
                </div>
                <div class="flex items-center space-x-2">
                    <button onclick="loadSubscriptions(${currentPage - 1})"
                        ${currentPage <= 1 ? 'disabled' : ''}
                        class="px-4 py-2 bg-gray-200 rounded-lg hover:bg-gray-300 disabled:opacity-50 disabled:cursor-not-allowed text-sm font-medium">
                        <i class="fas fa-chevron-left mr-1"></i>Previous
                    </button>
                    <span class="px-3 py-2 text-sm text-gray-700 font-medium">Page ${currentPage} of ${totalPages}</span>
                    <button onclick="loadSubscriptions(${currentPage + 1})"
                        ${currentPage >= totalPages ? 'disabled' : ''}
                        class="px-4 py-2 bg-gray-200 rounded-lg hover:bg-gray-300 disabled:opacity-50 disabled:cursor-not-allowed text-sm font-medium">
                        Next<i class="fas fa-chevron-right ml-1"></i>
                    </button>
                </div>
            `;
        }

        // --- Modal Controls ---

        function showCreateModal() {
            document.getElementById('modalTitle').textContent = 'New Subscription';
            document.getElementById('subscriptionForm').reset();
            document.getElementById('subscriptionId').value = '';
            document.getElementById('autoRenew').checked = true;
            document.getElementById('billingCycle').value = 'MONTHLY';
            // Set default start date to today
            document.getElementById('startDate').value = new Date().toISOString().split('T')[0];
            document.getElementById('subscriptionModal').classList.remove('hidden');
        }

        function hideModal() {
            document.getElementById('subscriptionModal').classList.add('hidden');
        }

        function showDeleteModal(id) {
            document.getElementById('deleteSubscriptionId').value = id;
            document.getElementById('deleteModal').classList.remove('hidden');
        }

        function hideDeleteModal() {
            document.getElementById('deleteModal').classList.add('hidden');
        }

        // --- Edit ---

        async function editSubscription(id) {
            try {
                const response = await fetchWithAuth(`${API_BASE}/customer-subscriptions/${id}`);
                if (response.ok) {
                    const result = await response.json();
                    const sub = result.data || result;

                    document.getElementById('modalTitle').textContent = 'Edit Subscription';
                    document.getElementById('subscriptionId').value = sub.id || id;
                    document.getElementById('contactId').value = sub.contactId || '';
                    document.getElementById('planName').value = sub.planName || '';
                    document.getElementById('description').value = sub.description || '';
                    document.getElementById('amount').value = sub.amount || '';
                    document.getElementById('billingCycle').value = sub.billingCycle || 'MONTHLY';
                    document.getElementById('startDate').value = sub.startDate ? sub.startDate.split('T')[0] : '';
                    document.getElementById('endDate').value = sub.endDate ? sub.endDate.split('T')[0] : '';
                    document.getElementById('autoRenew').checked = sub.autoRenew !== false;
                    document.getElementById('notes').value = sub.notes || '';

                    document.getElementById('subscriptionModal').classList.remove('hidden');
                } else {
                    showNotification('Failed to load subscription', 'error');
                }
            } catch (error) {
                console.error('Error loading subscription:', error);
                showNotification('An error occurred', 'error');
            }
        }

        // --- Delete ---

        async function confirmDelete() {
            const id = document.getElementById('deleteSubscriptionId').value;
            if (!id) return;

            try {
                const response = await fetchWithAuth(`${API_BASE}/customer-subscriptions/${id}`, {
                    method: 'DELETE'
                });
                if (response.ok) {
                    hideDeleteModal();
                    loadSubscriptions(currentPage);
                    showNotification('Subscription deleted successfully', 'success');
                } else {
                    showNotification('Failed to delete subscription', 'error');
                }
            } catch (error) {
                console.error('Error deleting subscription:', error);
                showNotification('An error occurred', 'error');
            }
        }

        // --- Form Submit ---

        document.getElementById('subscriptionForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const id = document.getElementById('subscriptionId').value;
            const contactId = document.getElementById('contactId').value;
            const planName = document.getElementById('planName').value.trim();
            const description = document.getElementById('description').value.trim();
            const amount = parseFloat(document.getElementById('amount').value);
            const billingCycle = document.getElementById('billingCycle').value;
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            const autoRenew = document.getElementById('autoRenew').checked;
            const notes = document.getElementById('notes').value.trim();

            if (!contactId || !planName || isNaN(amount)) {
                showNotification('Please fill in all required fields', 'error');
                return;
            }

            const data = {
                contactId,
                planName,
                amount,
                billingCycle,
                startDate,
                autoRenew,
                ...(description && { description }),
                ...(endDate && { endDate }),
                ...(notes && { notes })
            };

            try {
                const url = id ? `${API_BASE}/customer-subscriptions/${id}` : `${API_BASE}/customer-subscriptions`;
                const method = id ? 'PUT' : 'POST';

                const response = await fetchWithAuth(url, {
                    method,
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    hideModal();
                    loadSubscriptions(currentPage);
                    showNotification(id ? 'Subscription updated!' : 'Subscription created!', 'success');
                } else {
                    const result = await response.json();
                    showNotification(`Error: ${result.error?.message || result.message || 'Failed to save'}`, 'error');
                }
            } catch (error) {
                console.error('Error saving subscription:', error);
                showNotification('An error occurred. Please try again.', 'error');
            }
        });

        // --- Debounced Search ---

        let searchTimeout;
        document.getElementById('searchInput').addEventListener('input', () => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => loadSubscriptions(1), 400);
        });

        document.getElementById('statusFilter').addEventListener('change', () => loadSubscriptions(1));
        document.getElementById('billingCycleFilter').addEventListener('change', () => loadSubscriptions(1));

        // --- Initial Load ---
        loadContacts();
        loadSubscriptions();
    </script>
</body>
</html>
