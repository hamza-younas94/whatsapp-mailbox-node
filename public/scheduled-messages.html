<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scheduled Messages - WhatsApp Mailbox</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .gradient-btn { background: linear-gradient(135deg, #128C7E 0%, #25D366 100%); }
        .gradient-btn:hover { background: linear-gradient(135deg, #0d6b5f 0%, #1fb855 100%); }
    </style>
</head>
<body class="bg-gray-50">
    <script>if (!localStorage.getItem('authToken')) window.location.href = '/login.html';</script>
    <script src="/js/navbar.js"></script>

    <div class="max-w-7xl mx-auto px-4 py-6">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-3xl font-bold text-gray-800"><i class="fas fa-clock text-green-500 mr-2"></i>Scheduled Messages</h1>
                <p class="text-gray-600 mt-1">Schedule messages to be sent at a specific time</p>
            </div>
            <button onclick="showCreateModal()" class="gradient-btn text-white px-6 py-3 rounded-xl font-medium shadow-lg hover:shadow-xl transition-all">
                <i class="fas fa-plus mr-2"></i>Schedule Message
            </button>
        </div>

        <!-- Status Tabs -->
        <div class="flex space-x-2 mb-6">
            <button onclick="filterStatus('')" id="tab-all" class="px-4 py-2 rounded-lg text-sm font-medium bg-green-100 text-green-700">All</button>
            <button onclick="filterStatus('PENDING')" id="tab-PENDING" class="px-4 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100">Pending</button>
            <button onclick="filterStatus('SENT')" id="tab-SENT" class="px-4 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100">Sent</button>
            <button onclick="filterStatus('FAILED')" id="tab-FAILED" class="px-4 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100">Failed</button>
            <button onclick="filterStatus('CANCELLED')" id="tab-CANCELLED" class="px-4 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100">Cancelled</button>
        </div>

        <!-- Messages List -->
        <div id="messagesList" class="space-y-3">
            <div class="text-center py-12 text-gray-400"><i class="fas fa-spinner fa-spin text-3xl"></i><p class="mt-3">Loading...</p></div>
        </div>
    </div>

    <!-- Create/Edit Modal -->
    <div id="createModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg">
            <div class="p-6 border-b">
                <h2 id="modalTitle" class="text-2xl font-bold text-gray-800">Schedule Message</h2>
            </div>
            <form id="messageForm" class="p-6 space-y-4">
                <input type="hidden" id="editId">
                <div>
                    <label class="block text-gray-700 font-medium mb-1">Contact</label>
                    <select id="contactId" required class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-green-500">
                        <option value="">Select a contact...</option>
                    </select>
                </div>
                <div>
                    <label class="block text-gray-700 font-medium mb-1">Message</label>
                    <textarea id="message" required rows="4" class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-green-500" placeholder="Type your message..."></textarea>
                </div>
                <div>
                    <label class="block text-gray-700 font-medium mb-1">Send At</label>
                    <input type="datetime-local" id="scheduledFor" required class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-green-500">
                </div>
                <div>
                    <label class="block text-gray-700 font-medium mb-1">Media URL (optional)</label>
                    <input type="url" id="mediaUrl" class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-green-500" placeholder="https://...">
                </div>
                <div class="flex space-x-3 pt-2">
                    <button type="submit" class="flex-1 gradient-btn text-white py-3 rounded-lg font-medium">
                        <i class="fas fa-clock mr-2"></i>Schedule
                    </button>
                    <button type="button" onclick="hideModal()" class="px-6 py-3 border rounded-lg text-gray-600 hover:bg-gray-50">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin + '/api/v1';
        const token = localStorage.getItem('authToken');
        let currentFilter = '';
        let contacts = [];

        async function fetchWithAuth(url, options = {}) {
            const res = await fetch(url, { ...options, headers: { ...options.headers, 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' } });
            if (res.status === 401) { localStorage.removeItem('authToken'); window.location.href = '/login.html'; }
            return res.json();
        }

        async function loadContacts() {
            const data = await fetchWithAuth(`${API_BASE}/contacts?limit=500`);
            contacts = data.data || [];
            const select = document.getElementById('contactId');
            contacts.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c.id;
                opt.textContent = c.name || c.phoneNumber;
                select.appendChild(opt);
            });
        }

        async function loadMessages() {
            const url = currentFilter ? `${API_BASE}/scheduled-messages?status=${currentFilter}` : `${API_BASE}/scheduled-messages`;
            const data = await fetchWithAuth(url);
            const messages = data.data || [];
            const container = document.getElementById('messagesList');

            if (messages.length === 0) {
                container.innerHTML = '<div class="text-center py-12 text-gray-400"><i class="fas fa-clock text-5xl mb-4 opacity-30"></i><p>No scheduled messages</p></div>';
                return;
            }

            container.innerHTML = messages.map(m => {
                const statusColors = { PENDING: 'bg-yellow-100 text-yellow-700', SENT: 'bg-green-100 text-green-700', FAILED: 'bg-red-100 text-red-700', CANCELLED: 'bg-gray-100 text-gray-600' };
                const contactName = m.contact?.name || m.contact?.phoneNumber || 'Unknown';
                const date = new Date(m.scheduledFor).toLocaleString();
                return `
                <div class="bg-white rounded-xl p-4 shadow-sm border hover:shadow-md transition-all">
                    <div class="flex justify-between items-start">
                        <div class="flex-1">
                            <div class="flex items-center gap-3 mb-2">
                                <span class="font-semibold text-gray-800">${contactName}</span>
                                <span class="px-2 py-0.5 rounded-full text-xs font-medium ${statusColors[m.status] || ''}">${m.status}</span>
                            </div>
                            <p class="text-gray-600 text-sm mb-1">${m.message.substring(0, 150)}${m.message.length > 150 ? '...' : ''}</p>
                            <p class="text-gray-400 text-xs"><i class="fas fa-clock mr-1"></i>${date}</p>
                            ${m.error ? `<p class="text-red-500 text-xs mt-1"><i class="fas fa-exclamation-circle mr-1"></i>${m.error}</p>` : ''}
                        </div>
                        ${m.status === 'PENDING' ? `
                        <div class="flex gap-2 ml-4">
                            <button onclick="editMessage('${m.id}')" class="text-blue-500 hover:text-blue-700 text-sm"><i class="fas fa-edit"></i></button>
                            <button onclick="cancelMessage('${m.id}')" class="text-red-500 hover:text-red-700 text-sm"><i class="fas fa-times"></i></button>
                        </div>` : ''}
                    </div>
                </div>`;
            }).join('');
        }

        function filterStatus(status) {
            currentFilter = status;
            document.querySelectorAll('[id^="tab-"]').forEach(t => {
                t.className = 'px-4 py-2 rounded-lg text-sm font-medium ' + (t.id === `tab-${status || 'all'}` ? 'bg-green-100 text-green-700' : 'text-gray-600 hover:bg-gray-100');
            });
            loadMessages();
        }

        function showCreateModal() {
            document.getElementById('editId').value = '';
            document.getElementById('modalTitle').textContent = 'Schedule Message';
            document.getElementById('messageForm').reset();
            document.getElementById('createModal').classList.remove('hidden');
        }

        function hideModal() { document.getElementById('createModal').classList.add('hidden'); }

        async function cancelMessage(id) {
            if (!confirm('Cancel this scheduled message?')) return;
            await fetchWithAuth(`${API_BASE}/scheduled-messages/${id}`, { method: 'DELETE' });
            loadMessages();
        }

        document.getElementById('messageForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const editId = document.getElementById('editId').value;
            const body = {
                contactId: document.getElementById('contactId').value,
                message: document.getElementById('message').value,
                scheduledFor: new Date(document.getElementById('scheduledFor').value).toISOString(),
                mediaUrl: document.getElementById('mediaUrl').value || undefined,
            };

            if (editId) {
                await fetchWithAuth(`${API_BASE}/scheduled-messages/${editId}`, { method: 'PUT', body: JSON.stringify(body) });
            } else {
                await fetchWithAuth(`${API_BASE}/scheduled-messages`, { method: 'POST', body: JSON.stringify(body) });
            }

            hideModal();
            loadMessages();
        });

        document.getElementById('createModal').addEventListener('click', (e) => { if (e.target === document.getElementById('createModal')) hideModal(); });

        loadContacts();
        loadMessages();
    </script>
</body>
</html>
