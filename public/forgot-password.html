<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - WhatsApp Mailbox</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-green-400 to-blue-500 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8">
        <div class="text-center mb-8">
            <i class="fab fa-whatsapp text-green-500 text-6xl mb-4"></i>
            <h1 class="text-3xl font-bold text-gray-800 mb-2">Forgot Password</h1>
            <p class="text-gray-600">Enter your email to receive a password reset link</p>
        </div>

        <form id="forgotForm" class="space-y-6">
            <div>
                <label class="block text-gray-700 font-medium mb-2">Email</label>
                <input type="email" id="email" required
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent"
                    placeholder="your@email.com">
            </div>

            <div id="errorMessage" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded"></div>
            <div id="successMessage" class="hidden bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded"></div>

            <button type="submit" id="submitBtn"
                class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 rounded-lg transition duration-200">
                <i class="fas fa-envelope mr-2"></i>Send Reset Link
            </button>
        </form>

        <div class="mt-6 text-center">
            <a href="/login.html" class="text-green-500 hover:text-green-600 font-medium">
                <i class="fas fa-arrow-left mr-1"></i>Back to Login
            </a>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin + '/api/v1';

        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');
            const submitBtn = document.getElementById('submitBtn');

            errorDiv.classList.add('hidden');
            successDiv.classList.add('hidden');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Sending...';

            try {
                const response = await fetch(`${API_BASE}/auth/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    if (data.data.resetUrl) {
                        successDiv.innerHTML = `
                            <p class="font-medium mb-2">Reset link generated!</p>
                            <p class="text-sm">Copy this link and open it in your browser:</p>
                            <a href="${data.data.resetUrl}" class="text-green-700 underline text-sm break-all">${data.data.resetUrl}</a>
                        `;
                    } else {
                        successDiv.textContent = 'If an account exists with that email, a reset link has been generated.';
                    }
                    successDiv.classList.remove('hidden');
                } else {
                    errorDiv.textContent = data.error?.message || 'Failed to process request';
                    errorDiv.classList.remove('hidden');
                }
            } catch (error) {
                errorDiv.textContent = 'Connection error. Please try again.';
                errorDiv.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-envelope mr-2"></i>Send Reset Link';
            }
        });

        if (localStorage.getItem('authToken')) {
            window.location.href = '/dashboard.html';
        }
    </script>
</body>
</html>
