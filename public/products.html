<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - WhatsApp Mailbox</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https: data:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.tailwindcss.com https://cdnjs.cloudflare.com https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com; font-src 'self' data: https://cdnjs.cloudflare.com https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' http://whatshub.nexofydigital.com:3000 https://whatshub.nexofydigital.com:3000;">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .gradient-btn { background: linear-gradient(135deg, #128C7E 0%, #25D366 100%); }
        .gradient-btn:hover { background: linear-gradient(135deg, #0d6b5f 0%, #1fb855 100%); }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-gray-50">
    <script>
        if (!localStorage.getItem('authToken')) window.location.href = '/login.html';
    </script>
    <script src="/js/navbar.js"></script>

    <div class="max-w-7xl mx-auto px-4 py-6">
        <!-- Header -->
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-3xl font-bold text-gray-800">📦 Products & Inventory</h1>
                <p class="text-gray-600 mt-1">Manage your product catalog and stock levels</p>
            </div>
            <button onclick="showCreateModal()"
                class="gradient-btn text-white px-6 py-3 rounded-xl font-medium shadow-lg hover:shadow-xl transition-all">
                <i class="fas fa-plus mr-2"></i>Add Product
            </button>
        </div>

        <!-- Stats Cards -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
            <div class="bg-white rounded-xl shadow-sm p-5 border-l-4 border-gray-400">
                <div class="flex justify-between items-center">
                    <div>
                        <div class="text-3xl font-bold text-gray-800" id="totalCount">0</div>
                        <div class="text-sm text-gray-500">Total Products</div>
                    </div>
                    <div class="p-3 bg-gray-100 rounded-full">
                        <i class="fas fa-boxes-stacked text-gray-600 text-xl"></i>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-sm p-5 border-l-4 border-green-500">
                <div class="flex justify-between items-center">
                    <div>
                        <div class="text-3xl font-bold text-green-600" id="activeCount">0</div>
                        <div class="text-sm text-gray-500">Active</div>
                    </div>
                    <div class="p-3 bg-green-100 rounded-full">
                        <i class="fas fa-check-circle text-green-600 text-xl"></i>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-sm p-5 border-l-4 border-red-500">
                <div class="flex justify-between items-center">
                    <div>
                        <div class="text-3xl font-bold text-red-600" id="lowStockCount">0</div>
                        <div class="text-sm text-gray-500">Low Stock</div>
                    </div>
                    <div class="p-3 bg-red-100 rounded-full">
                        <i class="fas fa-exclamation-triangle text-red-600 text-xl"></i>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-sm p-5 border-l-4 border-blue-500">
                <div class="flex justify-between items-center">
                    <div>
                        <div class="text-3xl font-bold text-blue-600" id="categoryCount">0</div>
                        <div class="text-sm text-gray-500">Categories</div>
                    </div>
                    <div class="p-3 bg-blue-100 rounded-full">
                        <i class="fas fa-tags text-blue-600 text-xl"></i>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm">
            <!-- Filters & Search -->
            <div class="p-4 border-b grid grid-cols-1 md:grid-cols-5 gap-4">
                <div class="md:col-span-2 relative">
                    <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
                    <input type="text" id="searchInput" placeholder="Search by name, SKU, or description..."
                        class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500">
                </div>
                <select id="categoryFilter" class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500">
                    <option value="">All Categories</option>
                </select>
                <select id="statusFilter" class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500">
                    <option value="">All Status</option>
                    <option value="true">Active</option>
                    <option value="false">Inactive</option>
                </select>
                <label class="flex items-center px-4 py-2 border border-gray-300 rounded-lg cursor-pointer hover:bg-gray-50 transition-all">
                    <input type="checkbox" id="lowStockFilter" class="mr-2 w-4 h-4 text-red-600 rounded focus:ring-red-500">
                    <span class="text-sm text-gray-700"><i class="fas fa-exclamation-circle text-red-500 mr-1"></i>Low Stock Only</span>
                </label>
            </div>

            <!-- Products Grid -->
            <div id="productsList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 p-4">
                <div class="col-span-full p-8 text-center text-gray-500">
                    <i class="fas fa-spinner fa-spin text-4xl mb-2"></i>
                    <p>Loading products...</p>
                </div>
            </div>

            <!-- Pagination -->
            <div id="pagination" class="p-4 border-t flex justify-between items-center"></div>
        </div>
    </div>

    <!-- Create/Edit Product Modal -->
    <div id="productModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl max-w-2xl w-full p-6 max-h-[90vh] overflow-y-auto shadow-2xl">
            <div class="flex items-center justify-between mb-4">
                <h2 id="modalTitle" class="text-2xl font-bold text-gray-800">📦 New Product</h2>
                <button onclick="hideProductModal()" class="p-2 hover:bg-gray-100 rounded-full transition-all">
                    <i class="fas fa-times text-gray-500"></i>
                </button>
            </div>
            <form id="productForm" class="space-y-4">
                <input type="hidden" id="productId">

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-gray-700 mb-2 font-medium">Product Name *</label>
                        <input type="text" id="productName" required
                            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500"
                            placeholder="e.g., Wireless Headphones">
                    </div>
                    <div>
                        <label class="block text-gray-700 mb-2 font-medium">SKU *</label>
                        <input type="text" id="productSku" required
                            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500"
                            placeholder="e.g., WH-1000">
                    </div>
                </div>

                <div>
                    <label class="block text-gray-700 mb-2 font-medium">Description</label>
                    <textarea id="productDescription" rows="3"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 text-sm"
                        placeholder="Product description..."></textarea>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-gray-700 mb-2 font-medium">Category</label>
                        <input type="text" id="productCategory"
                            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500"
                            placeholder="e.g., Electronics" list="categorySuggestions">
                        <datalist id="categorySuggestions"></datalist>
                    </div>
                    <div>
                        <label class="block text-gray-700 mb-2 font-medium">Unit</label>
                        <input type="text" id="productUnit"
                            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500"
                            placeholder="e.g., pcs, kg, liters">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-gray-700 mb-2 font-medium">Price *</label>
                        <div class="relative">
                            <span class="absolute left-3 top-2.5 text-gray-400">$</span>
                            <input type="number" id="productPrice" required step="0.01" min="0"
                                class="w-full pl-7 pr-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500"
                                placeholder="0.00">
                        </div>
                    </div>
                    <div>
                        <label class="block text-gray-700 mb-2 font-medium">Cost</label>
                        <div class="relative">
                            <span class="absolute left-3 top-2.5 text-gray-400">$</span>
                            <input type="number" id="productCost" step="0.01" min="0"
                                class="w-full pl-7 pr-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500"
                                placeholder="0.00">
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-gray-700 mb-2 font-medium">Stock Quantity *</label>
                        <input type="number" id="productStockQuantity" required min="0"
                            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500"
                            placeholder="0">
                    </div>
                    <div>
                        <label class="block text-gray-700 mb-2 font-medium">Low Stock Alert</label>
                        <input type="number" id="productLowStockAlert" min="0"
                            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500"
                            placeholder="e.g., 10">
                    </div>
                </div>

                <div class="flex items-end">
                    <label class="flex items-center p-3 border rounded-lg cursor-pointer hover:bg-gray-50 transition-all has-[:checked]:bg-green-50 has-[:checked]:border-green-500 w-full">
                        <input type="checkbox" id="productIsActive" checked class="mr-3 w-5 h-5 text-green-600 rounded">
                        <div>
                            <span class="font-medium text-gray-800">Active</span>
                            <p class="text-xs text-gray-500">Product is available and visible</p>
                        </div>
                    </label>
                </div>

                <div class="border-t pt-4 flex space-x-4">
                    <button type="submit" class="flex-1 gradient-btn text-white py-3 rounded-lg font-semibold shadow-lg transition-all">
                        <i class="fas fa-save mr-2"></i>Save Product
                    </button>
                    <button type="button" onclick="hideProductModal()"
                        class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-800 py-3 rounded-lg font-semibold transition-all">
                        Cancel
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Inventory Modal -->
    <div id="inventoryModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl max-w-3xl w-full p-6 max-h-[90vh] overflow-y-auto shadow-2xl">
            <div class="flex items-center justify-between mb-4">
                <h2 id="inventoryModalTitle" class="text-2xl font-bold text-gray-800">📋 Inventory History</h2>
                <button onclick="hideInventoryModal()" class="p-2 hover:bg-gray-100 rounded-full transition-all">
                    <i class="fas fa-times text-gray-500"></i>
                </button>
            </div>

            <!-- Current Stock Summary -->
            <div id="inventoryStockSummary" class="bg-gray-50 rounded-lg p-4 mb-4">
                <div class="flex items-center justify-between">
                    <div>
                        <span class="text-sm text-gray-500">Current Stock</span>
                        <div class="text-3xl font-bold text-gray-800" id="inventoryCurrentStock">0</div>
                    </div>
                    <div id="inventoryStockBadge"></div>
                </div>
            </div>

            <!-- Add Inventory Transaction -->
            <div class="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-4">
                <h3 class="font-semibold text-blue-800 mb-3"><i class="fas fa-plus-circle mr-2"></i>Add Transaction</h3>
                <form id="inventoryForm" class="grid grid-cols-1 md:grid-cols-4 gap-3">
                    <input type="hidden" id="inventoryProductId">
                    <div>
                        <label class="block text-sm text-blue-700 mb-1 font-medium">Type *</label>
                        <select id="inventoryType" required class="w-full px-3 py-2 border border-blue-300 rounded-lg focus:ring-2 focus:ring-blue-500 bg-white text-sm">
                            <option value="IN">Stock In</option>
                            <option value="OUT">Stock Out</option>
                            <option value="ADJUSTMENT">Adjustment</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm text-blue-700 mb-1 font-medium">Quantity *</label>
                        <input type="number" id="inventoryQuantity" required min="1"
                            class="w-full px-3 py-2 border border-blue-300 rounded-lg focus:ring-2 focus:ring-blue-500 text-sm"
                            placeholder="0">
                    </div>
                    <div>
                        <label class="block text-sm text-blue-700 mb-1 font-medium">Reason</label>
                        <input type="text" id="inventoryReason"
                            class="w-full px-3 py-2 border border-blue-300 rounded-lg focus:ring-2 focus:ring-blue-500 text-sm"
                            placeholder="e.g., Purchase order">
                    </div>
                    <div class="flex items-end">
                        <button type="submit" class="w-full px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-medium text-sm transition-all">
                            <i class="fas fa-plus mr-1"></i>Add
                        </button>
                    </div>
                </form>
                <div class="mt-2">
                    <label class="block text-sm text-blue-700 mb-1 font-medium">Notes</label>
                    <input type="text" id="inventoryNotes"
                        class="w-full px-3 py-2 border border-blue-300 rounded-lg focus:ring-2 focus:ring-blue-500 text-sm"
                        placeholder="Additional notes (optional)">
                </div>
            </div>

            <!-- Inventory History -->
            <div>
                <h3 class="font-semibold text-gray-800 mb-3"><i class="fas fa-history mr-2"></i>Transaction History</h3>
                <div id="inventoryHistoryList" class="space-y-2 max-h-64 overflow-y-auto">
                    <p class="text-gray-500 text-center py-4">Loading history...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin + '/api/v1';
        let allProducts = [];
        let allCategories = [];
        let currentPage = 1;
        let totalPages = 1;
        const PAGE_LIMIT = 12;

        async function fetchWithAuth(url, options = {}) {
            const token = localStorage.getItem('authToken');
            const headers = {
                'Content-Type': 'application/json',
                ...(token && { 'Authorization': `Bearer ${token}` }),
                ...options.headers
            };
            try {
                const response = await fetch(url, { ...options, headers });
                if (response.status === 401) {
                    localStorage.removeItem('authToken');
                    window.location.href = '/login.html';
                }
                return response;
            } catch (error) {
                console.error('Fetch error:', error);
                throw error;
            }
        }

        function showNotification(message, type = 'info') {
            const colors = { success: 'bg-green-500', error: 'bg-red-500', info: 'bg-blue-500', warning: 'bg-yellow-500' };
            const notification = document.createElement('div');
            notification.className = `fixed top-4 right-4 ${colors[type]} text-white px-6 py-3 rounded-lg shadow-lg z-50`;
            notification.textContent = message;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 3000);
        }

        // ── Load Products ──────────────────────────────────────────────────
        async function loadProducts(page = 1) {
            currentPage = page;
            const search = document.getElementById('searchInput').value;
            const category = document.getElementById('categoryFilter').value;
            const isActive = document.getElementById('statusFilter').value;
            const lowStock = document.getElementById('lowStockFilter').checked;

            const params = new URLSearchParams({
                page,
                limit: PAGE_LIMIT,
                ...(search && { search }),
                ...(category && { category }),
                ...(isActive && { isActive }),
                ...(lowStock && { lowStock: 'true' })
            });

            try {
                const response = await fetchWithAuth(`${API_BASE}/products?${params}`);
                if (response.ok) {
                    const result = await response.json();
                    const products = result.items || result.data || [];
                    allProducts = Array.isArray(products) ? products : [];
                    const meta = result.pagination || result;
                    totalPages = Math.ceil((meta.total || allProducts.length) / PAGE_LIMIT);
                    updateStats(meta);
                    extractCategories(allProducts);
                    displayProducts(allProducts);
                    displayPagination(meta);
                } else {
                    console.error('Failed to load products:', response.status);
                    allProducts = [];
                    displayProducts([]);
                }
            } catch (error) {
                console.error('Error loading products:', error);
                allProducts = [];
                displayProducts([]);
            }
        }

        function updateStats(meta) {
            const total = meta.total || allProducts.length;
            const active = meta.activeCount || allProducts.filter(p => p.isActive).length;
            const lowStock = meta.lowStockCount || allProducts.filter(p => p.stockQuantity <= (p.lowStockAlert || 0)).length;
            const categories = meta.categoryCount || new Set(allProducts.map(p => p.category).filter(Boolean)).size;

            document.getElementById('totalCount').textContent = total;
            document.getElementById('activeCount').textContent = active;
            document.getElementById('lowStockCount').textContent = lowStock;
            document.getElementById('categoryCount').textContent = categories;
        }

        function extractCategories(products) {
            const cats = [...new Set(products.map(p => p.category).filter(Boolean))].sort();
            if (cats.length > 0 && allCategories.join(',') !== cats.join(',')) {
                allCategories = cats;
                const filterSelect = document.getElementById('categoryFilter');
                const currentVal = filterSelect.value;
                filterSelect.innerHTML = '<option value="">All Categories</option>' +
                    cats.map(c => `<option value="${c}" ${c === currentVal ? 'selected' : ''}>${c}</option>`).join('');

                const datalist = document.getElementById('categorySuggestions');
                datalist.innerHTML = cats.map(c => `<option value="${c}">`).join('');
            }
        }

        // ── Display Products ───────────────────────────────────────────────
        function displayProducts(products) {
            const container = document.getElementById('productsList');

            if (products.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full p-12 text-center">
                        <div class="w-20 h-20 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-4">
                            <i class="fas fa-box-open text-4xl text-gray-400"></i>
                        </div>
                        <h3 class="text-xl font-semibold text-gray-700 mb-2">No products found</h3>
                        <p class="text-gray-500 mb-6">Create your first product to start managing inventory</p>
                        <button onclick="showCreateModal()" class="gradient-btn text-white px-6 py-3 rounded-lg font-medium shadow-lg">
                            <i class="fas fa-plus mr-2"></i>Create Product
                        </button>
                    </div>
                `;
                return;
            }

            container.innerHTML = products.map(product => {
                const isLowStock = product.stockQuantity <= (product.lowStockAlert || 0);
                const stockColorClass = isLowStock ? 'text-red-600' : 'text-green-600';
                const stockBgClass = isLowStock ? 'bg-red-50' : 'bg-green-50';
                const margin = product.price && product.cost ? ((product.price - product.cost) / product.price * 100).toFixed(0) : null;

                return `
                <div class="border rounded-xl p-5 hover:shadow-lg transition-all card-hover bg-white ${!product.isActive ? 'opacity-70 border-dashed' : ''}">
                    <div class="flex justify-between items-start mb-3">
                        <div class="flex flex-wrap gap-2">
                            ${product.category ? `
                            <span class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-xs font-semibold">
                                ${product.category}
                            </span>
                            ` : ''}
                            ${product.sku ? `
                            <span class="bg-gray-100 text-gray-600 px-3 py-1 rounded-full text-xs font-mono">
                                ${product.sku}
                            </span>
                            ` : ''}
                        </div>
                        <div class="flex space-x-1">
                            <button onclick="showInventoryModal('${product.id}')"
                                class="p-2 text-purple-500 hover:text-purple-700 hover:bg-purple-50 rounded-lg transition-all" title="Inventory">
                                <i class="fas fa-warehouse"></i>
                            </button>
                            <button onclick="editProduct('${product.id}')"
                                class="p-2 text-blue-500 hover:text-blue-700 hover:bg-blue-50 rounded-lg transition-all" title="Edit">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button onclick="deleteProduct('${product.id}')"
                                class="p-2 text-red-500 hover:text-red-700 hover:bg-red-50 rounded-lg transition-all" title="Delete">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>

                    <h3 class="font-semibold text-gray-800 mb-1 text-lg">${product.name || 'Untitled Product'}</h3>
                    ${product.description ? `<p class="text-gray-500 text-sm mb-3 line-clamp-2">${product.description}</p>` : '<div class="mb-3"></div>'}

                    <!-- Price -->
                    <div class="flex items-baseline gap-2 mb-3">
                        <span class="text-2xl font-bold text-gray-800">$${parseFloat(product.price || 0).toFixed(2)}</span>
                        ${product.cost ? `<span class="text-sm text-gray-400 line-through">$${parseFloat(product.cost).toFixed(2)}</span>` : ''}
                        ${margin !== null ? `<span class="text-xs font-semibold ${parseInt(margin) > 0 ? 'text-green-600' : 'text-red-600'}">${margin}% margin</span>` : ''}
                    </div>

                    <!-- Stock -->
                    <div class="${stockBgClass} rounded-lg p-3 mb-3">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-2">
                                <i class="fas fa-cubes ${stockColorClass}"></i>
                                <span class="text-sm font-medium text-gray-700">Stock</span>
                            </div>
                            <span class="text-lg font-bold ${stockColorClass}">
                                ${product.stockQuantity || 0}${product.unit ? ' ' + product.unit : ''}
                            </span>
                        </div>
                        ${isLowStock ? `
                        <div class="mt-1 flex items-center gap-1 text-xs text-red-600">
                            <i class="fas fa-exclamation-triangle"></i>
                            <span>Below alert threshold (${product.lowStockAlert || 0})</span>
                        </div>
                        ` : ''}
                    </div>

                    <!-- Footer -->
                    <div class="border-t pt-3 flex items-center justify-between text-xs">
                        <span class="text-gray-500">
                            ${product.updatedAt ? 'Updated ' + new Date(product.updatedAt).toLocaleDateString() : ''}
                        </span>
                        <span class="flex items-center ${product.isActive ? 'text-green-600' : 'text-gray-400'}">
                            <span class="w-2 h-2 rounded-full mr-1.5 ${product.isActive ? 'bg-green-500' : 'bg-gray-400'}"></span>
                            ${product.isActive ? 'Active' : 'Inactive'}
                        </span>
                    </div>
                </div>
            `}).join('');
        }

        // ── Pagination ─────────────────────────────────────────────────────
        function displayPagination(data) {
            const container = document.getElementById('pagination');
            const total = data.total || allProducts.length;
            const pages = Math.ceil(total / PAGE_LIMIT);

            if (total === 0) {
                container.innerHTML = '';
                return;
            }

            container.innerHTML = `
                <div class="text-sm text-gray-600">
                    Showing ${((currentPage - 1) * PAGE_LIMIT) + 1}-${Math.min(currentPage * PAGE_LIMIT, total)} of ${total} products
                </div>
                <div class="flex space-x-2">
                    <button onclick="loadProducts(${currentPage - 1})"
                        ${currentPage <= 1 ? 'disabled' : ''}
                        class="px-4 py-2 bg-gray-200 rounded-lg hover:bg-gray-300 disabled:opacity-50 disabled:cursor-not-allowed text-sm font-medium transition-all">
                        <i class="fas fa-chevron-left mr-1"></i>Previous
                    </button>
                    <span class="px-4 py-2 text-sm text-gray-600 flex items-center">Page ${currentPage} of ${pages || 1}</span>
                    <button onclick="loadProducts(${currentPage + 1})"
                        ${currentPage >= pages ? 'disabled' : ''}
                        class="px-4 py-2 bg-gray-200 rounded-lg hover:bg-gray-300 disabled:opacity-50 disabled:cursor-not-allowed text-sm font-medium transition-all">
                        Next<i class="fas fa-chevron-right ml-1"></i>
                    </button>
                </div>
            `;
        }

        // ── Product Modal ──────────────────────────────────────────────────
        function showCreateModal() {
            document.getElementById('modalTitle').textContent = '📦 New Product';
            document.getElementById('productForm').reset();
            document.getElementById('productId').value = '';
            document.getElementById('productIsActive').checked = true;
            document.getElementById('productModal').classList.remove('hidden');
        }

        function hideProductModal() {
            document.getElementById('productModal').classList.add('hidden');
        }

        async function editProduct(id) {
            try {
                const response = await fetchWithAuth(`${API_BASE}/products/${id}`);
                if (response.ok) {
                    const result = await response.json();
                    const product = result.data || result;

                    document.getElementById('modalTitle').textContent = '✏️ Edit Product';
                    document.getElementById('productId').value = product.id || id;
                    document.getElementById('productName').value = product.name || '';
                    document.getElementById('productSku').value = product.sku || '';
                    document.getElementById('productDescription').value = product.description || '';
                    document.getElementById('productCategory').value = product.category || '';
                    document.getElementById('productPrice').value = product.price || '';
                    document.getElementById('productCost').value = product.cost || '';
                    document.getElementById('productStockQuantity').value = product.stockQuantity ?? '';
                    document.getElementById('productLowStockAlert').value = product.lowStockAlert || '';
                    document.getElementById('productUnit').value = product.unit || '';
                    document.getElementById('productIsActive').checked = product.isActive !== false;
                    document.getElementById('productModal').classList.remove('hidden');
                } else {
                    showNotification('Failed to load product details', 'error');
                }
            } catch (error) {
                console.error('Error loading product:', error);
                showNotification('An error occurred', 'error');
            }
        }

        async function deleteProduct(id) {
            if (!confirm('Are you sure you want to delete this product? This action cannot be undone.')) return;

            try {
                const response = await fetchWithAuth(`${API_BASE}/products/${id}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    loadProducts(currentPage);
                    showNotification('Product deleted successfully', 'success');
                } else {
                    const result = await response.json().catch(() => ({}));
                    showNotification(result.error?.message || result.message || 'Failed to delete product', 'error');
                }
            } catch (error) {
                console.error('Error deleting product:', error);
                showNotification('An error occurred while deleting', 'error');
            }
        }

        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const id = document.getElementById('productId').value;
            const name = document.getElementById('productName').value.trim();
            const sku = document.getElementById('productSku').value.trim();
            const description = document.getElementById('productDescription').value.trim();
            const category = document.getElementById('productCategory').value.trim();
            const price = parseFloat(document.getElementById('productPrice').value);
            const costVal = document.getElementById('productCost').value;
            const cost = costVal ? parseFloat(costVal) : undefined;
            const stockQuantity = parseInt(document.getElementById('productStockQuantity').value, 10);
            const lowStockAlertVal = document.getElementById('productLowStockAlert').value;
            const lowStockAlert = lowStockAlertVal ? parseInt(lowStockAlertVal, 10) : undefined;
            const unit = document.getElementById('productUnit').value.trim();
            const isActive = document.getElementById('productIsActive').checked;

            if (!name || !sku) {
                showNotification('Please fill in Product Name and SKU', 'error');
                return;
            }

            if (isNaN(price) || price < 0) {
                showNotification('Please enter a valid price', 'error');
                return;
            }

            if (isNaN(stockQuantity) || stockQuantity < 0) {
                showNotification('Please enter a valid stock quantity', 'error');
                return;
            }

            const data = {
                name,
                sku,
                price,
                stockQuantity,
                isActive,
                ...(description && { description }),
                ...(category && { category }),
                ...(cost !== undefined && { cost }),
                ...(lowStockAlert !== undefined && { lowStockAlert }),
                ...(unit && { unit })
            };

            const url = id ? `${API_BASE}/products/${id}` : `${API_BASE}/products`;
            const method = id ? 'PUT' : 'POST';

            try {
                const response = await fetchWithAuth(url, {
                    method,
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    hideProductModal();
                    loadProducts(currentPage);
                    showNotification(id ? 'Product updated successfully!' : 'Product created successfully!', 'success');
                } else {
                    const result = await response.json().catch(() => ({}));
                    showNotification(`Error: ${result.error?.message || result.message || 'Failed to save product'}`, 'error');
                }
            } catch (error) {
                console.error('Error saving product:', error);
                showNotification('An error occurred. Please try again.', 'error');
            }
        });

        // ── Inventory Modal ────────────────────────────────────────────────
        async function showInventoryModal(productId) {
            document.getElementById('inventoryProductId').value = productId;

            const product = allProducts.find(p => p.id === productId);
            if (product) {
                document.getElementById('inventoryModalTitle').textContent = `📋 Inventory - ${product.name}`;
                updateInventoryStockDisplay(product);
            }

            document.getElementById('inventoryModal').classList.remove('hidden');
            document.getElementById('inventoryForm').reset();
            loadInventoryHistory(productId);
        }

        function hideInventoryModal() {
            document.getElementById('inventoryModal').classList.add('hidden');
        }

        function updateInventoryStockDisplay(product) {
            const isLowStock = product.stockQuantity <= (product.lowStockAlert || 0);
            document.getElementById('inventoryCurrentStock').textContent =
                `${product.stockQuantity || 0}${product.unit ? ' ' + product.unit : ''}`;

            const badge = document.getElementById('inventoryStockBadge');
            if (isLowStock) {
                badge.innerHTML = `<span class="bg-red-100 text-red-700 px-3 py-1 rounded-full text-sm font-semibold"><i class="fas fa-exclamation-triangle mr-1"></i>Low Stock</span>`;
            } else {
                badge.innerHTML = `<span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-sm font-semibold"><i class="fas fa-check-circle mr-1"></i>In Stock</span>`;
            }
        }

        async function loadInventoryHistory(productId) {
            const container = document.getElementById('inventoryHistoryList');
            container.innerHTML = '<p class="text-gray-500 text-center py-4"><i class="fas fa-spinner fa-spin mr-2"></i>Loading history...</p>';

            try {
                const response = await fetchWithAuth(`${API_BASE}/products/${productId}/inventory`);
                if (response.ok) {
                    const result = await response.json();
                    const transactions = result.items || result.data || [];
                    displayInventoryHistory(Array.isArray(transactions) ? transactions : []);
                } else {
                    container.innerHTML = '<p class="text-gray-400 text-center py-4">No inventory history found</p>';
                }
            } catch (error) {
                console.error('Error loading inventory:', error);
                container.innerHTML = '<p class="text-red-400 text-center py-4">Failed to load inventory history</p>';
            }
        }

        function displayInventoryHistory(transactions) {
            const container = document.getElementById('inventoryHistoryList');

            if (transactions.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-6 text-gray-400">
                        <i class="fas fa-clipboard-list text-3xl mb-2"></i>
                        <p>No transactions yet</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = transactions.map(tx => {
                const typeConfig = {
                    IN:         { icon: 'fa-arrow-down',  color: 'green',  label: 'Stock In',    sign: '+' },
                    OUT:        { icon: 'fa-arrow-up',    color: 'red',    label: 'Stock Out',   sign: '-' },
                    ADJUSTMENT: { icon: 'fa-sliders-h',   color: 'yellow', label: 'Adjustment',  sign: '' }
                };
                const config = typeConfig[tx.type] || typeConfig.ADJUSTMENT;

                return `
                <div class="flex items-center justify-between p-3 bg-gray-50 rounded-lg hover:bg-gray-100 transition-all">
                    <div class="flex items-center gap-3">
                        <div class="w-9 h-9 rounded-full bg-${config.color}-100 flex items-center justify-center flex-shrink-0">
                            <i class="fas ${config.icon} text-${config.color}-600 text-sm"></i>
                        </div>
                        <div>
                            <div class="font-medium text-gray-800 text-sm">${config.label}</div>
                            ${tx.reason ? `<div class="text-xs text-gray-500">${tx.reason}</div>` : ''}
                            ${tx.notes ? `<div class="text-xs text-gray-400 italic">${tx.notes}</div>` : ''}
                        </div>
                    </div>
                    <div class="text-right flex-shrink-0">
                        <div class="font-bold text-${config.color}-600 text-sm">${config.sign}${tx.quantity}</div>
                        <div class="text-xs text-gray-400">${tx.createdAt ? new Date(tx.createdAt).toLocaleString() : ''}</div>
                    </div>
                </div>
            `}).join('');
        }

        document.getElementById('inventoryForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const productId = document.getElementById('inventoryProductId').value;
            const type = document.getElementById('inventoryType').value;
            const quantity = parseInt(document.getElementById('inventoryQuantity').value, 10);
            const reason = document.getElementById('inventoryReason').value.trim();
            const notes = document.getElementById('inventoryNotes').value.trim();

            if (!type || isNaN(quantity) || quantity < 1) {
                showNotification('Please select a type and enter a valid quantity', 'error');
                return;
            }

            const data = {
                type,
                quantity,
                ...(reason && { reason }),
                ...(notes && { notes })
            };

            try {
                const response = await fetchWithAuth(`${API_BASE}/products/${productId}/inventory`, {
                    method: 'POST',
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    showNotification('Inventory transaction added!', 'success');
                    document.getElementById('inventoryForm').reset();
                    document.getElementById('inventoryNotes').value = '';

                    // Reload inventory history
                    loadInventoryHistory(productId);

                    // Reload product to get updated stock
                    try {
                        const prodResponse = await fetchWithAuth(`${API_BASE}/products/${productId}`);
                        if (prodResponse.ok) {
                            const prodResult = await prodResponse.json();
                            const updatedProduct = prodResult.data || prodResult;
                            updateInventoryStockDisplay(updatedProduct);

                            // Update the product in the local list
                            const idx = allProducts.findIndex(p => p.id === productId);
                            if (idx !== -1) {
                                allProducts[idx] = { ...allProducts[idx], ...updatedProduct };
                                displayProducts(allProducts);
                            }
                        }
                    } catch (err) {
                        // Silently fail; the main operation succeeded
                    }
                } else {
                    const result = await response.json().catch(() => ({}));
                    showNotification(result.error?.message || result.message || 'Failed to add transaction', 'error');
                }
            } catch (error) {
                console.error('Error adding inventory transaction:', error);
                showNotification('An error occurred. Please try again.', 'error');
            }
        });

        // ── Event Listeners ────────────────────────────────────────────────
        let searchDebounce = null;
        document.getElementById('searchInput').addEventListener('input', () => {
            clearTimeout(searchDebounce);
            searchDebounce = setTimeout(() => loadProducts(1), 300);
        });
        document.getElementById('categoryFilter').addEventListener('change', () => loadProducts(1));
        document.getElementById('statusFilter').addEventListener('change', () => loadProducts(1));
        document.getElementById('lowStockFilter').addEventListener('change', () => loadProducts(1));

        // Close modals on backdrop click
        document.getElementById('productModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('productModal')) hideProductModal();
        });
        document.getElementById('inventoryModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('inventoryModal')) hideInventoryModal();
        });

        // Close modals on Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                hideProductModal();
                hideInventoryModal();
            }
        });

        // ── Initial Load ───────────────────────────────────────────────────
        loadProducts();
    </script>
</body>
</html>
